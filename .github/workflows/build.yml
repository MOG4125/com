name: Compile IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Select Xcode Version
      run: sudo xcode-select -s /Applications/Xcode_15.4.app

    - name: Compile and Archive App
      run: |
        xcodebuild archive \
          -workspace . \
          -scheme MyApp \
          -destination "generic/platform=iOS" \
          -archivePath ./build/MyApp.xcarchive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          AD_HOC_CODE_SIGNING_ALLOWED=YES

    - name: Package Into IPA (Fail-Safe Method)
      run: |
        mkdir -p ./build/output/Payload
        cp -R ./build/MyApp.xcarchive/Products/Applications/MyApp.app ./build/output/Payload/
        cd ./build/output
        zip -r MyApp.ipa Payload
        rm -rf Payload

    - name: Upload IPA to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Compiled-App-Package
        path: ./build/output/MyApp.ipa
